{% extends "base.html" %}
{% block title %}观看直播 — 美股王{% endblock %}
{% block content %}
<div class="container" style="padding-top:20px">
  <div id="watchContent"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
const streamer={{ streamer_json|safe }};

let _livePollTimer = null;
let _liveBlobUrl = null;

function _escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function _stopLivePoll() {
  if (_livePollTimer) {
    clearInterval(_livePollTimer);
    _livePollTimer = null;
  }
  if (_liveBlobUrl) {
    try { URL.revokeObjectURL(_liveBlobUrl); } catch (e) {}
    _liveBlobUrl = null;
  }
}

function _startLivePoll() {
  _stopLivePoll();
  const img = document.getElementById('livePollImg');
  const wait = document.getElementById('liveWsWait');
  const urlBase =
    location.origin +
    '/api/live/last-frame/' +
    encodeURIComponent(streamer) +
    '?t=';

  function tick() {
    fetch(urlBase + Date.now(), { credentials: 'omit', cache: 'no-store' })
      .then((r) => {
        if (r.status === 404) return null;
        if (!r.ok) throw new Error(String(r.status));
        return r.blob();
      })
      .then((blob) => {
        if (!blob || !img) return;
        if (_liveBlobUrl) {
          try { URL.revokeObjectURL(_liveBlobUrl); } catch (e) {}
        }
        _liveBlobUrl = URL.createObjectURL(blob);
        img.src = _liveBlobUrl;
        if (wait) wait.style.display = 'none';
      })
      .catch(() => {});
  }

  tick();
  _livePollTimer = setInterval(tick, 130);
}

async function loadWatch() {
  const r = await APP.api('GET', `/api/live/user/${encodeURIComponent(streamer)}`);
  const u = r.user;
  const s = r.stream;
  const noServerFrame = !!(s && s.is_live && r.has_live_frame_buffer === false);
  const el = document.getElementById('watchContent');
  const av = u.avatar_url
    ? `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover">`
    : `<span style="font-size:18px;color:#000;font-weight:700">${(u.display_name || u.username)[0].toUpperCase()}</span>`;
  const memberBadge = u.is_member
    ? `<span class="badge badge-yellow">${I18N.t('common.year_member')}</span>`
    : '';
  if (s && s.is_live) {
    APP.api('POST', `/api/live/join/${encodeURIComponent(streamer)}`).catch(() => {});
    window.addEventListener('beforeunload', () => {
      navigator.sendBeacon(`/api/live/leave/${encodeURIComponent(streamer)}`);
      _stopLivePoll();
    });
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
        <div>
          <div style="background:#000;border-radius:var(--radius);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
            <div style="position:absolute;top:12px;left:12px;display:flex;gap:8px;z-index:3">
              <span class="badge badge-red" style="font-size:12px;padding:4px 12px">LIVE</span>
              <span class="badge badge-gray" style="font-size:12px;padding:4px 12px">👁 ${s.viewer_count || 0}${I18N.t('watch.viewers')}</span>
            </div>
            <img id="livePollImg" alt="" style="position:relative;z-index:1;width:100%;height:100%;object-fit:contain;background:#000;display:block"/>
            <div id="liveWsWait" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text3);max-width:420px;margin:auto;padding:0 16px;z-index:2;pointer-events:none;background:rgba(0,0,0,.45)">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <p style="font-size:14px;margin-top:10px;color:var(--text2);font-weight:600">${I18N.t('watch.connecting')}</p>
              <p style="font-size:12px;margin-top:8px;line-height:1.55;color:var(--text3)">${noServerFrame ? I18N.t('watch.no_server_frame') : I18N.t('watch.wait_capture')}</p>
              <p style="font-size:11px;margin-top:8px;color:var(--text3)">${typeof I18N !== 'undefined' && I18N.lang === 'en' ? 'Room' : '当前房间'}：<strong>@${_escapeHtml(u.username)}</strong></p>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin-top:12px">
            <a href="/u/${u.username}" class="profile-avatar" style="width:48px;height:48px;font-size:20px;flex-shrink:0">${av}</a>
            <div>
              <h2 style="font-size:18px">${s.title || I18N.t('common.live')}</h2>
              <div style="font-size:13px;color:var(--text3);display:flex;align-items:center;gap:8px;margin-top:4px"><a href="/u/${u.username}">${u.display_name || u.username}</a> ${memberBadge}</div>
            </div>
          </div>
        </div>
        <div class="card" style="height:fit-content">
          <h3 style="font-size:14px;margin-bottom:12px">${I18N.t('watch.chat_title')}</h3>
          <div style="height:300px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px">${I18N.t('watch.chat_dev')}</div>
        </div>
      </div>`;
    _startLivePoll();
  } else {
    _stopLivePoll();
    el.innerHTML = `<div class="card" style="text-align:center;padding:48px">
      <div style="display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:20px">
        <div class="profile-avatar" style="width:60px;height:60px;font-size:24px">${av}</div>
        <div style="text-align:left"><h2>${u.display_name || u.username}</h2><p style="color:var(--text3);font-size:13px">@${u.username} ${memberBadge}</p></div>
      </div>
      <p style="color:var(--text2);font-size:15px;margin-bottom:20px">${I18N.t('watch.offline')}</p>
      <a href="/u/${u.username}" class="btn btn-ghost">${I18N.t('watch.view_profile')}</a>
    </div>`;
  }
}
loadWatch();
</script>
{% endblock %}
