{% extends "base.html" %}
{% block title %}观看直播 — 美股王{% endblock %}
{% block content %}
<div class="container watch-page">
  <div id="watchContent"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
const streamer={{ streamer_json|safe }};

let _livePollTimer = null;
let _liveBlobUrl = null;
let _chatPollTimer = null;
let _chatSinceId = 0;
let _watchAudioViewer = null;
let _watchLiveKitRoom = null;
let _watchMedia = {};
let _watchLiveKitAudioUnlocked = false;
let _watchLiveKitAudioState = { page: 0, mic: 0, other: 0 };
let _watchUnlockCleanup = null;

function _storageKeyWatchAudioPage() {
  return 'uskingWatchAudioPage_' + streamer;
}
function _storageKeyWatchAudioMic() {
  return 'uskingWatchAudioMic_' + streamer;
}

function _stopWatchLiveKit() {
  if (typeof USKingLiveKit !== 'undefined' && _watchLiveKitRoom) {
    try {
      USKingLiveKit.disconnect(_watchLiveKitRoom);
    } catch (e) {}
    _watchLiveKitRoom = null;
  }
  _watchLiveKitAudioUnlocked = false;
  _watchLiveKitAudioState = { page: 0, mic: 0, other: 0 };
  const box = document.querySelector('.watch-video-box');
  if (box) {
    box.querySelectorAll('audio[data-lk-track-kind="audio"]').forEach((el) => el.remove());
  }
  if (_watchUnlockCleanup) {
    _watchUnlockCleanup();
    _watchUnlockCleanup = null;
  }
}

function _stopWatchAudio() {
  if (_watchAudioViewer) {
    _watchAudioViewer.stop();
    _watchAudioViewer = null;
  }
  if (_watchUnlockCleanup) {
    _watchUnlockCleanup();
    _watchUnlockCleanup = null;
  }
}

function _watchAudioPrefs() {
  let page = true;
  let mic = true;
  try {
    page = localStorage.getItem(_storageKeyWatchAudioPage()) !== '0';
    mic = localStorage.getItem(_storageKeyWatchAudioMic()) !== '0';
  } catch (e) {}
  return { page, mic };
}

function _setWatchAudioHint(text) {
  const hint = document.getElementById('watchAudioHint');
  if (hint) hint.textContent = text || '';
}

function _bindWatchUnlockGestures(unlockFn) {
  if (_watchUnlockCleanup) _watchUnlockCleanup();
  let done = false;
  const handler = function () {
    if (done) return;
    done = true;
    try {
      Promise.resolve(unlockFn()).finally(cleanup);
    } catch (e) {
      cleanup();
    }
  };
  const opts = { passive: true };
  const cleanup = function () {
    document.removeEventListener('pointerdown', handler, opts);
    document.removeEventListener('touchend', handler, opts);
    document.removeEventListener('keydown', handler, opts);
    _watchUnlockCleanup = null;
  };
  document.addEventListener('pointerdown', handler, opts);
  document.addEventListener('touchend', handler, opts);
  document.addEventListener('keydown', handler, opts);
  _watchUnlockCleanup = cleanup;
}

function _bindWatchAudioPrefInputs(onApply) {
  const prefs = _watchAudioPrefs();
  const cbP = document.getElementById('watchAudioPage');
  const cbM = document.getElementById('watchAudioMic');
  if (cbP) {
    cbP.checked = prefs.page;
    cbP.onchange = function () {
      try {
        localStorage.setItem(_storageKeyWatchAudioPage(), cbP.checked ? '1' : '0');
      } catch (e) {}
      if (onApply) onApply();
    };
  }
  if (cbM) {
    cbM.checked = prefs.mic;
    cbM.onchange = function () {
      try {
        localStorage.setItem(_storageKeyWatchAudioMic(), cbM.checked ? '1' : '0');
      } catch (e) {}
      if (onApply) onApply();
    };
  }
  return prefs;
}

function _watchLiveKitAudioElements() {
  const box = document.querySelector('.watch-video-box');
  return box ? Array.from(box.querySelectorAll('audio[data-lk-track-kind="audio"]')) : [];
}

function _updateWatchLiveKitAudioHint() {
  if (_watchLiveKitAudioState.page || _watchLiveKitAudioState.mic || _watchLiveKitAudioState.other) {
    _setWatchAudioHint(
      _watchLiveKitAudioUnlocked
        ? I18N.t('watch.audio_hint_webrtc_live')
        : I18N.t('watch.audio_hint_webrtc_locked')
    );
    return;
  }
  _setWatchAudioHint(I18N.t('watch.audio_hint_webrtc_wait'));
}

function _applyWatchLiveKitAudioPrefs() {
  const prefs = _watchAudioPrefs();
  _watchLiveKitAudioElements().forEach((el) => {
    const name = (el.dataset.lkTrackName || '').toLowerCase();
    let enabled = _watchLiveKitAudioUnlocked;
    if (name === 'page') enabled = enabled && prefs.page;
    else if (name === 'mic') enabled = enabled && prefs.mic;
    el.muted = !enabled;
    if (enabled) {
      el.play().catch(() => {
        _watchLiveKitAudioUnlocked = false;
        _updateWatchLiveKitAudioHint();
      });
    } else {
      try {
        el.pause();
      } catch (e) {}
    }
  });
  const btn = document.getElementById('watchAudioUnlock');
  if (btn) btn.style.display = _watchLiveKitAudioUnlocked ? 'none' : '';
  _updateWatchLiveKitAudioHint();
}

async function _unlockWatchLiveKitAudio() {
  _watchLiveKitAudioUnlocked = true;
  const v = document.getElementById('watchLiveRtc');
  if (v) v.muted = false;
  await Promise.all(
    _watchLiveKitAudioElements().map((el) =>
      el.play().catch(() => {
        _watchLiveKitAudioUnlocked = false;
      })
    )
  );
  _applyWatchLiveKitAudioPrefs();
}

function _registerWatchLiveKitAudio(track, publication, participant, audioEl) {
  const name = ((publication && (publication.trackName || publication.name)) || '').toLowerCase();
  if (name === 'page') _watchLiveKitAudioState.page += 1;
  else if (name === 'mic') _watchLiveKitAudioState.mic += 1;
  else _watchLiveKitAudioState.other += 1;
  if (audioEl) {
    audioEl.dataset.lkParticipant = participant && participant.identity ? participant.identity : '';
  }
  _applyWatchLiveKitAudioPrefs();
}

function _initWatchLiveKitAudioUI() {
  _watchLiveKitAudioUnlocked = false;
  _watchLiveKitAudioState = { page: 0, mic: 0, other: 0 };
  _bindWatchUnlockGestures(function () {
    return _unlockWatchLiveKitAudio().catch(() => {
      _setWatchAudioHint(I18N.t('watch.audio_hint_webrtc_blocked'));
    });
  });
  _bindWatchAudioPrefInputs(_applyWatchLiveKitAudioPrefs);
  const btn = document.getElementById('watchAudioUnlock');
  if (btn) {
    btn.style.display = '';
    btn.onclick = function () {
      _unlockWatchLiveKitAudio().catch(() => {
        _setWatchAudioHint(I18N.t('watch.audio_hint_webrtc_blocked'));
      });
    };
  }
  _updateWatchLiveKitAudioHint();
}

function _startWatchAudio() {
  _stopWatchAudio();
  if (typeof USKingLiveAudio === 'undefined') return;
  _watchAudioViewer = new USKingLiveAudio.Viewer(streamer);
  const prefs = _watchAudioPrefs();
  let p = prefs.page;
  let m = prefs.mic;
  _watchAudioViewer.setGains(p, m);
  _watchAudioViewer.start();
  const applyLegacy = function () {
    const cbP = document.getElementById('watchAudioPage');
    const cbM = document.getElementById('watchAudioMic');
    if (!_watchAudioViewer) return;
    _watchAudioViewer.setGains(cbP ? cbP.checked : false, cbM ? cbM.checked : false);
  };
  _bindWatchAudioPrefInputs(applyLegacy);
  const btn = document.getElementById('watchAudioUnlock');
  if (btn) {
    btn.style.display = '';
    btn.onclick = function () {
      if (!_watchAudioViewer) return;
      _watchAudioViewer.unlock().then(function () {
        btn.style.display = 'none';
      });
    };
  }
  _bindWatchUnlockGestures(function () {
    if (!_watchAudioViewer) return;
    return _watchAudioViewer.unlock().then(function () {
      const btn = document.getElementById('watchAudioUnlock');
      if (btn) btn.style.display = 'none';
    });
  });
  _setWatchAudioHint(I18N.t('watch.audio_hint_bar'));
}

function _escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function _stopLivePoll() {
  if (_livePollTimer) {
    clearInterval(_livePollTimer);
    _livePollTimer = null;
  }
  if (_liveBlobUrl) {
    try { URL.revokeObjectURL(_liveBlobUrl); } catch (e) {}
    _liveBlobUrl = null;
  }
}

function _stopWatchChat() {
  if (_chatPollTimer) {
    clearInterval(_chatPollTimer);
    _chatPollTimer = null;
  }
  _chatSinceId = 0;
}

function _startLivePoll() {
  _stopLivePoll();
  const img = document.getElementById('livePollImg');
  const wait = document.getElementById('liveWsWait');
  const urlBase =
    location.origin +
    '/api/live/last-frame/' +
    encodeURIComponent(streamer) +
    '?t=';

  function tick() {
    fetch(urlBase + Date.now(), { credentials: 'omit', cache: 'no-store' })
      .then((r) => {
        if (r.status === 404) return null;
        if (!r.ok) throw new Error(String(r.status));
        return r.blob();
      })
      .then((blob) => {
        if (!blob || !img) return;
        if (_liveBlobUrl) {
          try { URL.revokeObjectURL(_liveBlobUrl); } catch (e) {}
        }
        _liveBlobUrl = URL.createObjectURL(blob);
        img.src = _liveBlobUrl;
        if (wait) wait.style.display = 'none';
      })
      .catch(() => {});
  }

  tick();
  _livePollTimer = setInterval(tick, 130);
}

function _watchFitStorageKey() {
  return 'uskingWatchFit_' + streamer;
}

function _initWatchFit() {
  const box = document.querySelector('.watch-video-box');
  const bContain = document.getElementById('watchFitContain');
  const bCover = document.getElementById('watchFitCover');
  if (!box || !bContain || !bCover) return;
  let mode = localStorage.getItem(_watchFitStorageKey()) || 'contain';
  function apply() {
    box.classList.toggle('is-cover', mode === 'cover');
    bContain.classList.toggle('active', mode === 'contain');
    bCover.classList.toggle('active', mode === 'cover');
    try {
      localStorage.setItem(_watchFitStorageKey(), mode);
    } catch (e) {}
  }
  bContain.addEventListener('click', () => {
    mode = 'contain';
    apply();
  });
  bCover.addEventListener('click', () => {
    mode = 'cover';
    apply();
  });
  apply();
}

function _clearWatchChatEmpty() {
  const e = document.getElementById('watchChatEmpty');
  if (e) e.remove();
}

function _renderChatMessage(m) {
  const a = m.author || {};
  const name = _escapeHtml(a.display_name || a.username || '?');
  const body = _escapeHtml(m.content || '');
  let t = '';
  try {
    const loc = typeof I18N !== 'undefined' && I18N.lang === 'en' ? 'en-US' : 'zh-CN';
    t = new Date(m.created_at).toLocaleTimeString(loc, { hour: '2-digit', minute: '2-digit' });
  } catch (e) {}
  return (
    '<div class="watch-chat-msg" data-id="' +
    Number(m.id) +
    '"><div class="wc-user">' +
    name +
    '</div><div class="wc-body">' +
    body +
    '</div><div class="wc-time">' +
    _escapeHtml(t) +
    '</div></div>'
  );
}

async function _pollWatchChat() {
  const list = document.getElementById('watchChatList');
  if (!list) return;
  try {
    const r = await fetch(
      location.origin +
        '/api/live/chat/' +
        encodeURIComponent(streamer) +
        '?since_id=' +
        _chatSinceId,
      { credentials: 'omit', cache: 'no-store' }
    );
    const j = await r.json();
    if (!j.stream_live) return;
    const msgs = j.messages || [];
    let added = false;
    for (const m of msgs) {
      if (m.id > _chatSinceId) _chatSinceId = m.id;
      if (!list.querySelector('.watch-chat-msg[data-id="' + Number(m.id) + '"]')) {
        _clearWatchChatEmpty();
        list.insertAdjacentHTML('beforeend', _renderChatMessage(m));
        added = true;
      }
    }
    if (added) list.scrollTop = list.scrollHeight;
  } catch (e) {}
}

function _startWatchChat() {
  _stopWatchChat();
  _chatSinceId = 0;
  const list = document.getElementById('watchChatList');
  if (list) {
    list.innerHTML =
      '<p id="watchChatEmpty" class="watch-chat-empty">' +
      I18N.t('watch.chat_empty') +
      '</p>';
  }
  _pollWatchChat();
  _chatPollTimer = setInterval(_pollWatchChat, 2000);
}

function _initWatchChatUI() {
  const row = document.getElementById('watchChatInputRow');
  const hint = document.getElementById('watchChatLoginHint');
  const send = document.getElementById('watchChatSend');
  const inp = document.getElementById('watchChatInput');
  const logged = typeof APP !== 'undefined' && APP.user && APP.token;
  if (row) row.style.display = logged ? '' : 'none';
  if (hint) hint.style.display = logged ? 'none' : '';
  if (send) {
    send.onclick = () => _sendWatchChat();
    send.textContent = I18N.t('watch.chat_send');
  }
  if (inp) {
    inp.placeholder = I18N.t('watch.chat_ph');
    inp.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        _sendWatchChat();
      }
    };
  }
}

async function _startWatchWebRTC() {
  _stopWatchLiveKit();
  _initWatchLiveKitAudioUI();
  if (typeof USKingLiveKit === 'undefined') {
    if (_watchMedia.fallback_enabled !== false && _watchMedia.playback_mode !== 'hls') {
      _startLivePoll();
      _startWatchAudio();
    }
    return;
  }
  const img = document.getElementById('livePollImg');
  const v = document.getElementById('watchLiveRtc');
  const wait = document.getElementById('liveWsWait');
  if (img) img.style.display = 'none';
  if (v) {
    v.style.display = '';
    v.muted = true;
  }
  try {
    const r = await APP.api('GET', '/api/live/media/viewer-session/' + encodeURIComponent(streamer));
    const sess = r.session || {};
    const lk = sess.livekit;
    if (!lk || !lk.token || !lk.ws_url) throw new Error('no livekit session');
    _watchLiveKitRoom = await USKingLiveKit.viewerConnect({
      url: lk.ws_url,
      token: lk.token,
      iceServers: sess.ice_servers || (sess.livekit && sess.livekit.ice_servers) || [],
      peerConnectionTimeout: 25000,
      videoEl: v,
      onAudioTrack: function (track, publication, participant, audioEl) {
        _registerWatchLiveKitAudio(track, publication, participant, audioEl);
      },
      onAudioPlaybackBlocked: function () {
        _setWatchAudioHint(I18N.t('watch.audio_hint_webrtc_blocked'));
      },
      onFirstFrame: function () {
        if (wait) wait.style.display = 'none';
      },
      onDisconnected: function () {
        if (wait) wait.style.display = '';
      },
    });
    if (v) {
      v.addEventListener(
        'click',
        function () {
          _unlockWatchLiveKitAudio().catch(() => {
            _setWatchAudioHint(I18N.t('watch.audio_hint_webrtc_blocked'));
          });
        },
        { once: true }
      );
    }
    return _watchLiveKitRoom;
  } catch (e) {
    console.warn('watch WebRTC:', e);
    if (img) img.style.display = '';
    if (v) v.style.display = 'none';
    if (_watchMedia.fallback_enabled !== false && _watchMedia.playback_mode !== 'hls') {
      _startLivePoll();
      _startWatchAudio();
    }
  }
  return null;
}

async function _sendWatchChat() {
  const inp = document.getElementById('watchChatInput');
  if (!inp || typeof APP === 'undefined' || !APP.token) return;
  const v = (inp.value || '').trim();
  if (!v) return;
  inp.value = '';
  try {
    const data = await APP.api('POST', '/api/live/chat/' + encodeURIComponent(streamer), {
      content: v,
    });
    const m = data.message;
    if (m && m.id > _chatSinceId) _chatSinceId = m.id;
    const list = document.getElementById('watchChatList');
    if (list && m && !list.querySelector('.watch-chat-msg[data-id="' + Number(m.id) + '"]')) {
      _clearWatchChatEmpty();
      list.insertAdjacentHTML('beforeend', _renderChatMessage(m));
      list.scrollTop = list.scrollHeight;
    }
  } catch (e) {
    alert(e.message || '发送失败');
  }
}

async function loadWatch() {
  await APP.init();
  const r = await APP.api('GET', `/api/live/user/${encodeURIComponent(streamer)}`);
  const u = r.user;
  const s = r.stream;
  const media = r.media || {};
  _watchMedia = media;
  const mediaBackend = media.backend || 'legacy_jpeg';
  const playbackMode = media.playback_mode || 'legacy_jpeg';
  const lkReady = !!(media.livekit && media.livekit.ready);
  const useWebRTC =
    mediaBackend === 'livekit' && playbackMode === 'webrtc' && lkReady;
  const useLegacyPreview =
    !useWebRTC &&
    (playbackMode === 'legacy_jpeg' ||
      (media.fallback_enabled !== false && playbackMode !== 'hls'));
  const noServerFrame = !!(s && s.is_live && r.has_live_frame_buffer === false);
  const el = document.getElementById('watchContent');
  const av = u.avatar_url
    ? `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover">`
    : `<span style="font-size:18px;color:#000;font-weight:700">${(u.display_name || u.username)[0].toUpperCase()}</span>`;
  const memberBadge = u.is_member
    ? `<span class="badge badge-yellow">${I18N.t('common.year_member')}</span>`
    : '';
  if (s && s.is_live) {
    APP.api('POST', `/api/live/join/${encodeURIComponent(streamer)}`).catch(() => {});
    window.addEventListener('beforeunload', () => {
      navigator.sendBeacon(`/api/live/leave/${encodeURIComponent(streamer)}`);
      _stopLivePoll();
      _stopWatchChat();
      _stopWatchLiveKit();
      _stopWatchAudio();
    });
    el.innerHTML = `
      <div class="watch-layout">
        <div class="watch-main-col">
          <div class="watch-video-box">
            <div class="watch-badges">
              <span class="badge badge-red watch-badge-live">LIVE</span>
              <span class="badge badge-gray watch-badge-vc">👁 ${s.viewer_count || 0}${I18N.t('watch.viewers')}</span>
            </div>
            <div class="watch-video-tools">
              <div class="watch-fit-toggle" role="group" aria-label="video fit">
                <button type="button" id="watchFitContain" title="${_escapeHtml(I18N.t('watch.fit_contain_title'))}">${I18N.t('watch.fit_contain_label')}</button>
                <button type="button" id="watchFitCover" title="${_escapeHtml(I18N.t('watch.fit_full_title'))}">${I18N.t('watch.fit_full')}</button>
              </div>
            </div>
            <div class="watch-audio-bar" id="watchAudioBar">
              <button type="button" id="watchAudioUnlock" class="watch-audio-unlock-btn">${I18N.t('watch.audio_unlock')}</button>
              <span class="watch-audio-hint" id="watchAudioHint">${I18N.t('watch.audio_hint_bar')}</span>
              <label class="watch-audio-lab"><input type="checkbox" id="watchAudioPage" checked /> ${I18N.t('watch.audio_page')}</label>
              <label class="watch-audio-lab"><input type="checkbox" id="watchAudioMic" checked /> ${I18N.t('watch.audio_mic')}</label>
            </div>
            <img id="livePollImg" class="watch-video-img" alt="" />
            <video id="watchLiveRtc" class="watch-video-img" playsinline autoplay muted style="display:none"></video>
            <div id="liveWsWait" class="watch-wait-overlay">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <p style="font-size:14px;margin-top:10px;color:var(--text2);font-weight:600">${I18N.t('watch.connecting')}</p>
              <p style="font-size:12px;margin-top:8px;line-height:1.55;color:var(--text3)">${noServerFrame ? I18N.t('watch.no_server_frame') : I18N.t('watch.wait_capture')}</p>
              <p style="font-size:11px;margin-top:8px;color:var(--text3)">${I18N.t('watch.media_backend')}：<strong>${_escapeHtml(mediaBackend)}</strong> · ${I18N.t('watch.playback_mode')}：<strong>${_escapeHtml(I18N.t('watch.mode_' + playbackMode) || playbackMode)}</strong></p>
              ${playbackMode !== 'legacy_jpeg' ? `<p style="font-size:11px;margin-top:6px;color:var(--text3)">${I18N.t('watch.mode_note_fallback')}</p>` : ''}
              <p style="font-size:11px;margin-top:8px;color:var(--text3)">${typeof I18N !== 'undefined' && I18N.lang === 'en' ? 'Room' : '当前房间'}：<strong>@${_escapeHtml(u.username)}</strong></p>
            </div>
          </div>
          <div class="watch-meta-row">
            <a href="/u/${u.username}" class="profile-avatar">${av}</a>
            <div class="watch-meta-text">
              <h2 class="watch-meta-title">${s.title || I18N.t('common.live')}</h2>
              <div class="watch-meta-sub"><a href="/u/${u.username}">${u.display_name || u.username}</a> ${memberBadge}</div>
            </div>
          </div>
        </div>
        <div class="card watch-chat-card">
          <h3 class="watch-chat-h">${I18N.t('watch.chat_title')}</h3>
          <div class="watch-chat-body">
            <div id="watchChatList" class="watch-chat-list"></div>
            <div id="watchChatInputRow" class="watch-chat-input-row" style="display:none">
              <input type="text" id="watchChatInput" maxlength="500" autocomplete="off" />
              <button type="button" id="watchChatSend">${I18N.t('watch.chat_send')}</button>
            </div>
            <p id="watchChatLoginHint" class="watch-chat-hint" style="display:none"><a href="/login">${I18N.t('watch.chat_login')}</a></p>
          </div>
        </div>
      </div>`;
    _initWatchFit();
    _initWatchChatUI();
    _startWatchChat();
    if (useWebRTC) {
      _startWatchWebRTC();
    } else {
      if (useLegacyPreview) _startLivePoll();
      _startWatchAudio();
    }
  } else {
    _stopLivePoll();
    _stopWatchChat();
    _stopWatchLiveKit();
    _stopWatchAudio();
    el.innerHTML = `<div class="card watch-offline-card">
      <div style="display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:20px">
        <div class="profile-avatar" style="width:60px;height:60px;font-size:24px">${av}</div>
        <div style="text-align:left"><h2>${u.display_name || u.username}</h2><p style="color:var(--text3);font-size:13px">@${u.username} ${memberBadge}</p></div>
      </div>
      <p style="color:var(--text2);font-size:15px;margin-bottom:20px">${I18N.t('watch.offline')}</p>
      <a href="/u/${u.username}" class="btn btn-ghost">${I18N.t('watch.view_profile')}</a>
    </div>`;
  }
}
loadWatch();
</script>
{% endblock %}
