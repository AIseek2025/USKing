# 生产示例：cp .env.example .env 并填写密钥后执行
# docker compose -f docker-compose.prod.yml up -d --build

services:
  web:
    build: .
    image: usking-web:latest
    container_name: usking-web
    # 宿主机端口须与 Nginx proxy_pass（如 127.0.0.1:8002）一致；8000 常被其他站占用
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      DEV_MODE: "false"
      DATABASE_URL: sqlite:////data/meiguwang.db
      UPLOAD_DIR: /data/uploads
    volumes:
      - usking-data:/data

volumes:
  usking-data:
